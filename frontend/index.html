<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billie — Processador de faturas</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">

    <!-- ---------- cabeçalho ---------- -->
    <header class="header">
      <div class="brand">
        <h1>Billie</h1>
        <p>Extração local de faturas</p>
      </div>
      <button id="btn-tema" type="button" class="icon-btn" aria-label="Alternar tema">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4.2" />
          <path d="M12 2.8v3M12 18.2v3M4.3 4.3l2.1 2.1M17.6 17.6l2.1 2.1M2.8 12h3M18.2 12h3M4.3 19.7l2.1-2.1M17.6 6.4l2.1-2.1" />
        </svg>
      </button>
    </header>

    <!-- ---------- banner de atualização ---------- -->
    <div id="update-banner" class="update-banner">
      <span id="update-text">Nova versão disponível</span>
      <button id="btn-update">Atualizar</button>
    </div>

    <!-- ---------- arquivo ---------- -->
    <section class="section">
      <p class="section-label">Arquivo</p>
      <button id="file-row" class="file-row empty" type="button">
        <span class="file-name" id="file-name">Nenhum arquivo selecionado</span>
        <span class="leader"></span>
        <span class="file-action">Procurar PDF</span>
      </button>
      <input type="file" id="file-input" accept="application/pdf" hidden />
    </section>

    <!-- ---------- configurações da fatura ---------- -->
    <section class="section">
      <p class="section-label">Detalhes da fatura</p>
      <div class="field-row">
        <div class="field">
          <label for="senha">Senha do PDF</label>
          <input type="password" id="senha" placeholder="opcional" autocomplete="off" />
        </div>
        <div class="field">
          <label for="banco">Banco</label>
          <select id="banco">
            <option>Nubank</option>
            <option>XP / Rico</option>
            <option>Santander</option>
          </select>
        </div>
        <div class="field">
          <label for="ano">Ano da fatura</label>
          <select id="ano"></select>
        </div>
      </div>
    </section>

    <!-- ---------- personalização de colunas do csv ---------- -->
    <section class="section">
      <p class="section-label">Nomes das colunas (CSV)</p>
      <div class="field-row">
        <div class="field">
          <label for="col-data">Data</label>
          <input type="text" id="col-data" />
        </div>
        <div class="field">
          <label for="col-estabelecimento">Estabelecimento</label>
          <input type="text" id="col-estabelecimento" />
        </div>
        <div class="field">
          <label for="col-valor">Valor</label>
          <input type="text" id="col-valor" />
        </div>
      </div>
      <button id="btn-restaurar-colunas" type="button" class="link-button">Restaurar padrão</button>
    </section>

    <!-- ---------- processar ---------- -->
    <button id="btn-processar" class="btn-primary">Processar fatura</button>

    <!-- ---------- log ---------- -->
    <section class="section">
      <p class="section-label">Registro</p>
      <div id="log" class="log"></div>
    </section>

  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
